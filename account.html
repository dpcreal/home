<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

  const config = {
    apiKey: "AIzaSyChRzNJs4XyLxliSVSFNb8rsmcXFDw5XIo",
    authDomain: "woodpecker-e4c85.firebaseapp.com",
    projectId: "woodpecker-e4c85",
    storageBucket: "woodpecker-e4c85.firebasestorage.app",
    messagingSenderId: "1039525973528",
    appId: "1:1039525973528:web:a836bb3172767aa104fd6d",
    measurementId: "G-SD1VV3H7E4"
  };

  const app = initializeApp(config);
  const auth = getAuth(app);

  const statusEl = document.getElementById("status");

  const showSignup = document.getElementById("showSignup");
  const showLogin = document.getElementById("showLogin");
  const signupPanel = document.getElementById("signupPanel");
  const loginPanel = document.getElementById("loginPanel");

  function setMode(mode) {
    const signup = mode === "signup";
    showSignup.classList.toggle("active", signup);
    showLogin.classList.toggle("active", !signup);
    signupPanel.classList.toggle("active", signup);
    loginPanel.classList.toggle("active", !signup);
    statusEl.textContent = "Ready.";
  }

  showSignup.addEventListener("click", () => setMode("signup"));
  showLogin.addEventListener("click", () => setMode("login"));

  function usernameToEmail(username) {
    const clean = username.trim().toLowerCase();

    if (!/^[a-z0-9._-]+$/.test(clean)) {
      throw new Error("Username can only use letters, numbers, dots, dashes, and underscores.");
    }

    return `${clean}@woodpecker.local`;
  }

  function friendlyMessage(error) {
    const code = error?.code || "";

    if (code.includes("email-already-in-use")) {
      return "That username is already taken.";
    }
    if (code.includes("invalid-email")) {
      return "That username is not valid.";
    }
    if (code.includes("weak-password")) {
      return "Password should be at least 6 characters.";
    }
    if (code.includes("invalid-credential") || code.includes("wrong-password") || code.includes("user-not-found")) {
      return "Incorrect username or password.";
    }
    if (code.includes("too-many-requests")) {
      return "Too many attempts. Please try again later.";
    }

    return "Something went wrong. Please try again.";
  }

  document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("signupUsername").value;
    const password = document.getElementById("signupPassword").value;

    try {
      const email = usernameToEmail(username);
      await createUserWithEmailAndPassword(auth, email, password);
      statusEl.textContent = "Account created. Redirecting...";
      window.location.href = "order.html";
    } catch (err) {
      statusEl.textContent = friendlyMessage(err);
    }
  });

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("loginUsername").value;
    const password = document.getElementById("loginPassword").value;

    try {
      const email = usernameToEmail(username);
      await signInWithEmailAndPassword(auth, email, password);
      statusEl.textContent = "Logged in. Redirecting...";
      window.location.href = "order.html";
    } catch (err) {
      statusEl.textContent = friendlyMessage(err);
    }
  });
</script>
