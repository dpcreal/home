<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account | Woodpecker Inc</title>
  <meta name="description" content="Sign in to your Woodpecker Inc account and view your orders." />
  <style>
    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #7c4a22;
      --primary-dark: #5f3617;
      --border: #e5ded7;
      --shadow: 0 16px 40px rgba(31, 41, 55, 0.08);
      --success-bg: rgba(34, 197, 94, 0.1);
      --success-border: rgba(34, 197, 94, 0.2);
      --success-text: #166534;
      --error-bg: rgba(239, 68, 68, 0.1);
      --error-border: rgba(239, 68, 68, 0.2);
      --error-text: #991b1b;
      --max: 1100px;
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 16px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #faf8f5 0%, #f7f5f2 100%);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    .container { width: min(100% - 2rem, var(--max)); margin: 0 auto; }
    .topbar {
      padding: 1.25rem 0;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      color: var(--primary);
    }
    .hero { padding: 1rem 0 2rem; }
    .tag {
      display: inline-block;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      background: rgba(124, 74, 34, 0.08);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: clamp(2.35rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin: 0 0 0.85rem;
    }
    h2 { margin: 0 0 0.65rem; font-size: 1.45rem; }
    .hero p, .panel p, .subtle { color: var(--muted); }
    .hero p { font-size: 1.05rem; max-width: 60ch; margin: 0; }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 1.2rem;
      padding-bottom: 3rem;
      align-items: start;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
      margin-bottom: 1rem;
    }
    .tab {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 0.8rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
      transition: 0.2s ease;
    }
    .tab:hover { border-color: var(--primary); color: var(--primary); }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .field { display: grid; gap: 0.45rem; margin-bottom: 1rem; }
    label { font-weight: 700; font-size: 0.96rem; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.95rem 1rem;
      font: inherit;
      color: var(--text);
      background: #fff;
    }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid rgba(124, 74, 34, 0.18);
      border-color: var(--primary);
    }
    .btn, .ghost-btn, .danger-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.95rem 1.35rem;
      border-radius: 999px;
      font-weight: 800;
      font: inherit;
      cursor: pointer;
      transition: 0.2s ease;
      text-decoration: none;
    }
    .btn { border: 0; background: var(--primary); color: white; box-shadow: var(--shadow); }
    .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .ghost-btn { border: 1px solid var(--border); background: #fff; color: var(--text); }
    .ghost-btn:hover { border-color: var(--primary); color: var(--primary); }
    .danger-btn {
      border: 1px solid rgba(239,68,68,0.25);
      background: rgba(239,68,68,0.08);
      color: #991b1b;
    }
    .danger-btn:hover { background: rgba(239,68,68,0.12); }
    .btn:disabled, .ghost-btn:disabled, .danger-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .message {
      display: none;
      margin-bottom: 1rem;
      padding: 1rem;
      border-radius: 18px;
      font-weight: 600;
    }
    .message.success { background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success-text); }
    .message.error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
    .hidden { display: none !important; }
    .profile-card { display: grid; gap: 1rem; }
    .profile-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      width: fit-content;
      padding: 0.5rem 0.8rem;
      border-radius: 999px;
      background: rgba(124, 74, 34, 0.08);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.92rem;
    }
    .profile-stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.8rem;
    }
    .stat {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem;
      background: #fcfbfa;
    }
    .stat strong { display: block; font-size: 1.15rem; margin-bottom: 0.2rem; }
    .stat span { color: var(--muted); font-size: 0.95rem; }
