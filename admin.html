<html lang="en">
<head>

  <title>Admin Orders | Woodpecker Inc</title>
  <style>
    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #7c4a22;
      --primary-dark: #5f3617;
      --border: #e5ded7;
      --shadow: 0 16px 40px rgba(31, 41, 55, 0.08);
      --success-bg: rgba(34, 197, 94, 0.1);
      --success-border: rgba(34, 197, 94, 0.2);
      --success-text: #166534;
      --error-bg: rgba(239, 68, 68, 0.1);
      --error-border: rgba(239, 68, 68, 0.2);
      --error-text: #991b1b;
      --max: 1280px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #faf8f5 0%, #f7f5f2 100%);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    .container { width: min(100% - 2rem, var(--max)); margin: 0 auto; }
    .topbar {
      padding: 1.25rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .back-link { font-weight: 700; color: var(--primary); }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
    }
    .tag {
      display: inline-block;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      background: rgba(124, 74, 34, 0.08);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: clamp(2.4rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin: 0 0 0.8rem;
    }
    .subtle { color: var(--muted); }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 220px 220px;
      gap: 1rem;
      margin-top: 1rem;
    }
    input, select, textarea, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.95rem 1rem;
      font: inherit;
      background: #fff;
    }
    textarea { min-height: 110px; resize: vertical; }
    button {
      cursor: pointer;
      font-weight: 800;
      transition: 0.2s ease;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .message {
      display: none;
      margin-bottom: 1rem;
      padding: 1rem;
      border-radius: 18px;
      font-weight: 600;
    }
    .message.success { background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success-text); }
    .message.error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
    .orders-grid { display: grid; gap: 1rem; }
    .order-card {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: #fff;
      box-shadow: var(--shadow);
      padding: 1.2rem;
    }
